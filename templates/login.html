<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f0f2f5;">
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <form class="bg-white p-4 rounded-3 shadow" style="width:360px" action="{{ url_for('login') }}" method="POST">
      <h4 class="mb-3 text-center fw-bold">⚡ FieldOps Login</h4>
      {% with messages = get_flashed_messages() %}
        {% if messages %}<div class="alert alert-danger py-2">{{ messages[0] }}</div>{% endif %}
      {% endwith %}
      <input name="email" type="email" class="form-control mb-3" placeholder="Email" required>
      <input name="password" type="password" class="form-control mb-3" placeholder="Password" required>
      <button type="submit" class="btn btn-dark w-100">Login</button>
      <p class="text-center mt-3 text-muted small">No account? <a href="{{ url_for('register') }}">Register</a></p>
    </form>
  </div>
</body>
</html>
