<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f0f2f5;">
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <form action="{{ url_for('register') }}" method="POST" class="bg-white p-4 rounded-3 shadow" style="width:360px">
      <h4 class="mb-3 text-center fw-bold">⚡ Register</h4>
      {% with messages = get_flashed_messages() %}
        {% if messages %}<div class="alert alert-danger py-2">{{ messages[0] }}</div>{% endif %}
      {% endwith %}
      <input name="name" class="form-control mb-2" placeholder="Full Name" required>
      <input name="phone" class="form-control mb-2" placeholder="Phone">
      <input name="email" type="email" class="form-control mb-2" placeholder="Email" required>
      <select name="role" class="form-select mb-2">
        <option>Admin</option><option>Electrician</option>
      </select>
      <input name="password" type="password" class="form-control mb-3" placeholder="Password" required>
      <button type="submit" class="btn btn-dark w-100">Register</button>
      <p class="text-center mt-3 text-muted small">Have account? <a href="{{ url_for('login') }}">Login</a></p>
    </form>
  </div>
</body>
</html>
